services:
  frontend-dev:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    environment:
      - NODE_ENV=development
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app:rw
      - ./frontend/node_modules:/app/node_modules:rw
    develop:
      watch:
        - action: rebuild
          path: package.json
    depends_on:
      - libre-translate
