name: Deploy to Firebase Hosting

on:
  workflow_dispatch:
  push:
    branches:
      - master
    tags:
      - "v*"
  pull_request:
    branches:
      - master

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  FIREBASE_CLI_EXPERIMENTS: ${{ vars.FIREBASE_CLI_EXPERIMENTS }}

jobs:
  build_and_deploy:
    name: Job - Build and Deploy to Firebase Hosting
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Step 1 - Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Step 2 - Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Step 3 - Audit
        run: bun audit

      - name: Step 4 - Install Dependencies
        run: bun install

      - name: Step 5 - Lint
        run: bun run lint

      - name: Step 6 - Build & Deploy to Firebase Hosting Preview (Pull Request)
        if: ${{ github.event_name == 'pull_request' }}
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: ${{ vars.FIREBASE_PROJECT_ID }}
          expires: ${{ vars.FIREBASE_EXPIRES }}
          entryPoint: ./

      - name: Step 7 - Build & Deploy to Firebase Hosting Production (Push)
        if: ${{ github.event_name == 'push' || github.event_name == 'workflow_dispatch' }}
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: ${{ vars.FIREBASE_PROJECT_ID }}
          channelId: ${{ vars.FIREBASE_CHANNEL_ID }}
          entryPoint: ./

  update_release:
    name: Create or Update GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    needs: build_and_deploy
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Generate release tag
        id: release_tag
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
            echo "name=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            TAG="release-$(date +'%Y%m%d-%H%M%S')"
            echo "tag=$TAG" >> $GITHUB_OUTPUT
            echo "name=Release $(date +'%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_OUTPUT
          fi

      - name: Create or update GitHub Release
        uses: ncipollo/release-action@v1.20.0
        with:
          tag: ${{ steps.release_tag.outputs.tag }}
          name: ${{ steps.release_tag.outputs.name }}
          body: |
            Deployed to production from ${{ github.ref_name }}

            Built from commit ${{ github.sha }}.
          allowUpdates: true
          draft: false
          prerelease: false
          token: ${{ secrets.GITHUB_TOKEN }}
