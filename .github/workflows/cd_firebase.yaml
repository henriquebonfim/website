name: Deploy to Firebase Hosting

on:
  workflow_dispatch:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  FIREBASE_CLI_EXPERIMENTS: ${{ vars.FIREBASE_CLI_EXPERIMENTS }}

jobs:
  build_and_deploy:
    name: Job - Build and Deploy to Firebase Hosting
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Step 1 - Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Step 2 - Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Step 3 - Install Dependencies
        run: bun install

      - name: Step 4 - Lint
        run: bun run lint

      - name: Step 5 - Audit dependencies
        run: bun audit

      - name: Step 6 - Build & Deploy to Firebase Hosting Preview (Pull Request)
        if: ${{ github.event_name == 'pull_request' }}
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: ${{ vars.FIREBASE_PROJECT_ID }}
          expires: ${{ vars.FIREBASE_EXPIRES }}
          entryPoint: ./

      - name: Step 7 - Build & Deploy to Firebase Hosting Production (Push)
        if: ${{ github.event_name == 'push' || github.event_name == 'workflow_dispatch' }}
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: ${{ vars.FIREBASE_PROJECT_ID }}
          channelId: ${{ vars.FIREBASE_CHANNEL_ID }}
          entryPoint: ./
