name: Deploy to Staging (Preview)

on:
  pull_request:
    branches:
      - staging
      - master
      - production

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build_and_deploy_staging:
    name: Build & Deploy to Preview Channel
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Dependencies
        run: bun install

      - name: Lint
        run: bun run lint

      - name: Build
        run: bun run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}

      - name: Deploy to Firebase Hosting Preview
        id: deploy_preview
        uses: FirebaseExtended/action-hosting-deploy@v0.10.0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: ${{ vars.FIREBASE_PROJECT_ID }}
          expires: ${{ vars.FIREBASE_EXPIRES || '30d' }}
          channelId: ${{ github.head_ref || 'staging' }}

      - name: Output Deployment URL
        run: |
          echo "🚀 Deployment successfully created!"
          echo "🌐 Preview URL: ${{ steps.deploy_preview.outputs.details_url }}"
          echo "🔗 All URLs: ${{ steps.deploy_preview.outputs.urls }}"

          # Add to GitHub Actions Job Summary
          echo "### 🚀 Deployment Successful" >> $GITHUB_STEP_SUMMARY
          echo "**Preview URL:** [${{ steps.deploy_preview.outputs.details_url }}](${{ steps.deploy_preview.outputs.details_url }})" >> $GITHUB_STEP_SUMMARY
